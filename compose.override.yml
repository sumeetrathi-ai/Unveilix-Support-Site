# Change log:
# [#001] 2026-06-22 — Sumeet — Remapped local host ports to avoid colliding with the
#         already-running Unveilix product dev stack (unveilix-postgres:5432,
#         unveilix-home:5173, unveilix-api-server:8080), and gated non-core services
#         (proxy/adminer/mailcatcher/playwright) behind Compose profiles so a bare
#         `docker compose up` brings up only db+prestart+backend+frontend.

services:

  # Local services are available on their ports, but also available on:
  # http://api.localhost.tiangolo.com: backend
  # http://dashboard.localhost.tiangolo.com: frontend
  # etc. To enable it, update .env, set:
  # DOMAIN=localhost.tiangolo.com
  proxy:
    # [#001] --by Sumeet (2026-06-22)
    # Before: proxy started by default on every `docker compose up`.
    # After: gated behind the "tools" profile; not needed for local dev (we hit
    #        backend/frontend on their own ports). Avoids binding host :80.
    # Why: spec wants one-command up = db+api+web; Traefik is optional locally and
    #      its :80 bind can clash with host services.
    profiles: ["tools"]
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    # Duplicate the command from compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    # [#001] --by Sumeet (2026-06-22)
    # Before: - "5432:5432"
    # After:  host 5433 -> container 5432.
    # Why: host :5432 is already taken by the running `unveilix-postgres` container.
    #      Containers talk to Postgres over the internal network (POSTGRES_SERVER=db),
    #      so only the host-side port needed shifting.
    ports:
      - "5433:5432"

  adminer:
    profiles: ["tools"]
    restart: "no"
    # [#001] --by Sumeet (2026-06-22)
    # Before: - "8080:8080"
    # After:  host 8081 -> container 8080, and gated behind "tools" profile.
    # Why: host :8080 is taken by `unveilix-api-server`; adminer is an optional DB UI.
    ports:
      - "8081:8080"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  mailcatcher:
    # [#001] --by Sumeet (2026-06-22)
    # Before: mailcatcher started by default.
    # After: gated behind "tools" profile.
    # Why: the app sends no email in v1 (out of scope §10); no need to run an SMTP
    #      catcher on every up. Backend still has SMTP_HOST=mailcatcher env set but
    #      never calls it.
    profiles: ["tools"]
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    # [#001] --by Sumeet (2026-06-22)
    # Before: - "5173:80"
    # After:  host 5174 -> container 80.
    # Why: host :5173 is taken by the running `unveilix-home` container.
    ports:
      - "5174:80"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=development

  playwright:
    # [#001] --by Sumeet (2026-06-22)
    # Before: playwright (heavy ~2GB image) built/started on every default `up`.
    # After: gated behind the "test" profile.
    # Why: e2e browser tests shouldn't build on a normal app launch.
    profiles: ["test"]
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend
      - mailcatcher
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - 9323:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
